<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>野球スコアブック</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#0d1526">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="スコアブック">
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="14" fill="white" stroke="#60aaff" stroke-width="1.5"/>
        <path d="M6 10 Q16 8 26 10" stroke="#1a3050" stroke-width="1.5" fill="none"/>
        <path d="M6 22 Q16 24 26 22" stroke="#1a3050" stroke-width="1.5" fill="none"/>
        <path d="M10 4 Q12 16 10 28" stroke="#1a3050" stroke-width="1.5" fill="none"/>
        <path d="M22 4 Q20 16 22 28" stroke="#1a3050" stroke-width="1.5" fill="none"/>
      </svg>
      <span class="header-title">野球スコアブック</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" id="btn-export" title="データをエクスポート">エクスポート</button>
      <label class="btn btn-ghost btn-sm" title="データをインポート">
        インポート
        <input type="file" id="input-import" accept=".json" style="display:none">
      </label>
    </div>
  </div>
</header>

<nav class="main-nav" id="main-nav">
  <div class="nav-inner">
    <button class="nav-tab active" data-tab="games">
      <svg class="tab-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
      <span class="tab-label">試合登録</span>
    </button>
    <button class="nav-tab" data-tab="players">
      <svg class="tab-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
      <span class="tab-label">選手管理</span>
    </button>
    <button class="nav-tab" data-tab="stats">
      <svg class="tab-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
      <span class="tab-label">成績集計</span>
    </button>
    <div class="nav-indicator" id="nav-indicator"></div>
  </div>
</nav>

<main class="main-content">

  <!-- 試合登録 -->
  <section class="tab-panel active" id="panel-games">
    <div class="panel-header">
      <h1 class="panel-title">試合登録</h1>
    </div>
    <div class="panel-body">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">新規試合登録</h2>
        </div>
        <form id="form-game" class="form-grid">
          <div class="form-group">
            <label class="form-label" for="game-date">試合日 <span class="required">*</span></label>
            <input type="date" id="game-date" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="game-opponent">対戦相手 <span class="required">*</span></label>
            <input type="text" id="game-opponent" class="form-input" placeholder="例: ○○高校" maxlength="30" required>
          </div>
          <div class="form-group form-group-full">
            <label class="form-label">種別</label>
            <div class="toggle-group">
              <label class="toggle-option"><input type="radio" name="game-type" value="spring" checked><span>春リーグ</span></label>
              <label class="toggle-option"><input type="radio" name="game-type" value="fall"><span>秋リーグ</span></label>
              <label class="toggle-option"><input type="radio" name="game-type" value="practice"><span>練習試合</span></label>
            </div>
          </div>
          <div class="form-group form-group-full">
            <label class="form-label">ホーム / アウェイ</label>
            <div class="toggle-group">
              <label class="toggle-option"><input type="radio" name="home-away" value="home" checked><span>ホーム</span></label>
              <label class="toggle-option"><input type="radio" name="home-away" value="away"><span>アウェイ</span></label>
            </div>
          </div>
          <div class="form-group form-group-full">
            <label class="form-label">自チーム得点 (イニング別)</label>
            <div id="inning-our"></div>
          </div>
          <div class="form-group form-group-full">
            <label class="form-label">相手チーム得点 (イニング別)</label>
            <div id="inning-opp"></div>
          </div>
          <div class="form-group form-group-full form-actions">
            <button type="submit" class="btn btn-primary">試合を登録する</button>
          </div>
        </form>
      </div>

      <!-- 成績入力エリア -->
      <div class="card" id="game-stats-entry" style="display:none">
        <div class="card-header">
          <div>
            <h2 class="card-title" id="stats-entry-game-label">成績入力</h2>
            <p class="stats-entry-subtitle">打撃・投球成績を入力してください</p>
          </div>
          <button class="btn btn-ghost-dark btn-sm" id="stats-entry-close">閉じる</button>
        </div>
        <div class="stats-entry-section">
          <button class="stats-entry-toggle" id="toggle-batting-entry">
            <svg class="stats-toggle-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
            <span>打撃成績入力（全選手）</span>
          </button>
          <div class="stats-entry-body" id="batting-entry-body"></div>
        </div>
        <div class="stats-entry-section">
          <button class="stats-entry-toggle" id="toggle-pitching-entry">
            <svg class="stats-toggle-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
            <span>投球成績入力</span>
          </button>
          <div class="stats-entry-body" id="pitching-entry-body">
            <div class="pitching-entry-header">
              <div class="form-group">
                <label class="form-label" for="stats-entry-pitcher-select">投手を選択</label>
                <select id="stats-entry-pitcher-select" class="form-select" style="max-width:280px">
                  <option value="">-- 投手を選択 --</option>
                </select>
              </div>
            </div>
            <div id="stats-entry-pitching-form"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">過去の試合</h2>
        </div>
        <div id="games-list"></div>
      </div>
    </div>
  </section>

  <!-- 選手管理 -->
  <section class="tab-panel" id="panel-players">
    <div class="panel-header">
      <h1 class="panel-title">選手管理</h1>
    </div>
    <div class="panel-body">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">選手追加</h2>
        </div>
        <form id="form-player" class="form-grid">
          <div class="form-group">
            <label class="form-label" for="player-name">選手名 <span class="required">*</span></label>
            <input type="text" id="player-name" class="form-input" placeholder="例: 田中 太郎" maxlength="30" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="player-furigana">ふりがな</label>
            <input type="text" id="player-furigana" class="form-input" placeholder="例: たなか たろう" maxlength="50">
          </div>
          <div class="form-group">
            <label class="form-label" for="player-number">背番号</label>
            <input type="number" id="player-number" class="form-input" placeholder="例: 10" min="0" max="99">
          </div>
          <div class="form-group">
            <label class="form-label" for="player-grade">学年</label>
            <select id="player-grade" class="form-select">
              <option value="1">1年</option>
              <option value="2">2年</option>
              <option value="3">3年</option>
              <option value="4">4年</option>
            </select>
          </div>
          <div class="form-group form-group-full">
            <label class="form-label">ポジション（複数選択可）</label>
            <div class="checkbox-group" id="player-positions">
              <label class="checkbox-option"><input type="checkbox" value="投手"><span>投手</span></label>
              <label class="checkbox-option"><input type="checkbox" value="捕手"><span>捕手</span></label>
              <label class="checkbox-option"><input type="checkbox" value="一塁手"><span>一塁手</span></label>
              <label class="checkbox-option"><input type="checkbox" value="二塁手"><span>二塁手</span></label>
              <label class="checkbox-option"><input type="checkbox" value="三塁手"><span>三塁手</span></label>
              <label class="checkbox-option"><input type="checkbox" value="遊撃手"><span>遊撃手</span></label>
              <label class="checkbox-option"><input type="checkbox" value="左翼手"><span>左翼手</span></label>
              <label class="checkbox-option"><input type="checkbox" value="中堅手"><span>中堅手</span></label>
              <label class="checkbox-option"><input type="checkbox" value="右翼手"><span>右翼手</span></label>
              <label class="checkbox-option"><input type="checkbox" value="指名打者"><span>指名打者</span></label>
            </div>
          </div>
          <div class="form-group form-group-full form-actions">
            <button type="submit" class="btn btn-primary">選手を追加する</button>
          </div>
        </form>
      </div>
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">選手一覧</h2>
        </div>
        <div id="players-list"></div>
      </div>
    </div>
  </section>

  <!-- 成績集計 -->
  <section class="tab-panel" id="panel-stats">
    <div class="panel-header">
      <h1 class="panel-title">成績集計</h1>
    </div>
    <div class="stats-subtabs">
      <nav class="subtab-nav">
        <button class="subtab active" data-subtab="batting-stats">打撃成績</button>
        <button class="subtab" data-subtab="pitching-stats">投球成績</button>
        <button class="subtab" data-subtab="game-stats">試合成績</button>
      </nav>
      <div class="subtab-content">
        <div class="subtab-panel active" id="subtab-batting-stats"></div>
        <div class="subtab-panel" id="subtab-pitching-stats"></div>
        <div class="subtab-panel" id="subtab-game-stats"></div>
      </div>
    </div>
  </section>

</main>

<!-- トースト通知 -->
<div id="toast" class="toast" aria-live="polite"></div>

<!-- 削除確認モーダル -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3 class="modal-title" id="modal-title">削除の確認</h3>
    <p class="modal-body" id="modal-body"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">キャンセル</button>
      <button class="btn btn-danger" id="modal-confirm">削除する</button>
    </div>
  </div>
</div>

<script src="chart.min.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
